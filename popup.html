<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salesforce Audit Log Dashboard</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>Audit Log Dashboard</h1>
            <div class="connection-status" id="connectionStatus">
                <span class="status-dot"></span>
                <span class="status-text">Disconnected</span>
            </div>
        </div>

        <!-- Connection Section -->
        <div class="connection-section" id="connectionSection">
            <div class="input-group">
                <input type="text" id="instanceUrl" placeholder="https://your-instance.salesforce.com" class="input-field">
                <button id="connectBtn" class="btn btn-primary">Connect</button>
            </div>

        </div>

        <!-- Dashboard Section -->
        <div class="dashboard-section" id="dashboardSection" style="display: none;">
            <div class="connected-info">
                <p class="instance-label">Connected to:</p>
                <p class="instance-value" id="connectedInstance"></p>
                <button id="openDashboardBtn" class="btn btn-primary btn-large">Open Dashboard ↗</button>
                <button id="disconnectBtn" class="btn btn-secondary btn-small">Disconnect</button>
            </div>
        </div>
    </div>

    <script src="utils/salesforce-api.js"></script>
    <script src="popup.js"></script>
</body>
</html>
